[pytest]
# Pytest Configuration for SkillUP Test Suite
# ===========================================

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    -ra
    --maxfail=20

# Markers for test categorization
markers =
    unit: Unit tests - fast, isolated, no external dependencies
    integration: Integration tests - tests interaction between components
    slow: Tests that take a long time to run
    databricks: Tests that require Databricks environment
    neo4j: Tests that require Neo4j database
    openai: Tests that require OpenAI API access
    smoke: Quick smoke tests for critical paths
